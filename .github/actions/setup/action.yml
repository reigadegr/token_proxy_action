name: "Setup Rust Environment"
description: "Setup Rust development environment with caching for RustFS"

inputs:
  rust-version:
    description: "Rust version to install"
    required: false
    default: "stable"
  target:
    description: "Target architecture to add"
    required: false
    default: ""
  github-token:
    description: "GitHub token for API access"
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Install system dependencies (Ubuntu)
      if: runner.os == 'Linux'
      uses: awalsh128/cache-apt-pkgs-action@latest 
      with: 
        packages: musl-tools build-essential lld llvm clang libdbus-1-dev libwayland-dev libwebkit2gtk-4.1-dev libxdo-dev pkg-config libssl-dev libx11-dev libasound2-dev libx11-xcb-dev libxkbcommon-dev libxkbcommon-x11-dev python3 python-is-python3 sqlite3 libcap-dev pkg-config

        execute_install_scripts: true

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        toolchain: ${{ inputs.rust-version }}
        targets: ${{ inputs.target }}
        components: rustfmt, clippy

    - name: Setup rust musl toolchains
      shell: bash
      run: |
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- --default-toolchain "${{ inputs.rust-version }}" --profile minimal -y
        if [ "${{ inputs.rust-version }}" = "nightly" ]; then
            toolchain="nightly"
        else
            toolchain="stable"
        fi
        rustup default "$toolchain"
        rustup component add rust-src llvm-tools-preview clippy rustfmt
        if [ -z "$(echo ${{ inputs.target }} | grep android)" ]; then
            rustup component add rust-src --toolchain "$toolchain"-"${{ inputs.target }}"
        fi
        rustup target add "${{ inputs.target }}" --toolchain "$toolchain"
        rustup update

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*

    - name: Setup NASM
      if: runner.os == 'Windows'
      uses: ilammy/setup-nasm@v1
      with:
        version: '2.16.01' 

    - name: Enable long paths in git
      if: runner.os == 'Windows'
      shell: bash
      run: |
        git config --system core.longpaths true

    - name: Enable long paths in windows
      if: runner.os == 'Windows'
      shell: powershell
      run: |
        New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
          -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
